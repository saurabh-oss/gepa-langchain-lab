<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Background with gradient -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c3cfe2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Main background -->
  <rect width="1200" height="630" fill="url(#grad)"/>

  <!-- Content area background -->
  <rect x="100" y="100" width="1000" height="430" fill="white" rx="20" opacity="0.95"/>

  <!-- Title -->
  <text x="600" y="180" font-size="72" font-weight="bold" fill="#667eea" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">
    GEPA + LangChain
  </text>

  <!-- Subtitle -->
  <text x="600" y="260" font-size="32" fill="#1a1a1a" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">
    Production-Ready Optimization Boilerplate
  </text>

  <!-- Three-layer architecture visualization -->
  <!-- Box 1: Build -->
  <g>
    <rect x="150" y="300" width="200" height="100" fill="url(#grad2)" rx="8" stroke="#667eea" stroke-width="2"/>
    <text x="250" y="335" font-size="24" font-weight="bold" fill="#667eea" text-anchor="middle">Build</text>
    <text x="250" y="365" font-size="16" fill="#333" text-anchor="middle">LangChain</text>
  </g>

  <!-- Arrow 1 -->
  <line x1="360" y1="350" x2="410" y2="350" stroke="#667eea" stroke-width="3" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#667eea" />
    </marker>
  </defs>

  <!-- Box 2: Measure -->
  <g>
    <rect x="440" y="300" width="200" height="100" fill="url(#grad2)" rx="8" stroke="#667eea" stroke-width="2"/>
    <text x="540" y="335" font-size="24" font-weight="bold" fill="#667eea" text-anchor="middle">Measure</text>
    <text x="540" y="365" font-size="16" fill="#333" text-anchor="middle">MLflow</text>
  </g>

  <!-- Arrow 2 -->
  <line x1="650" y1="350" x2="700" y2="350" stroke="#667eea" stroke-width="3" marker-end="url(#arrowhead)"/>

  <!-- Box 3: Optimize -->
  <g>
    <rect x="730" y="300" width="200" height="100" fill="url(#grad2)" rx="8" stroke="#667eea" stroke-width="2"/>
    <text x="830" y="330" font-size="24" font-weight="bold" fill="#667eea" text-anchor="middle">Optimize</text>
    <text x="830" y="360" font-size="14" fill="#333" text-anchor="middle">GEPA + MEGA</text>
  </g>

  <!-- Bottom tagline -->
  <text x="600" y="480" font-size="20" fill="#666" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">
    Closed-loop optimization for LLM applications
  </text>

  <!-- Icons/badges at bottom -->
  <circle cx="400" cy="550" r="25" fill="#667eea"/>
  <text x="400" y="560" font-size="20" text-anchor="middle" text-anchor="middle" fill="white">🎯</text>
  <text x="400" y="590" font-size="14" fill="#667eea" text-anchor="middle" font-weight="bold">Prompts</text>

  <circle cx="600" cy="550" r="25" fill="#764ba2"/>
  <text x="600" y="560" font-size="20" text-anchor="middle" fill="white">🔄</text>
  <text x="600" y="590" font-size="14" fill="#764ba2" text-anchor="middle" font-weight="bold">Workflows</text>

  <circle cx="800" cy="550" r="25" fill="#667eea"/>
  <text x="800" y="560" font-size="20" text-anchor="middle" fill="white">📊</text>
  <text x="800" y="590" font-size="14" fill="#667eea" text-anchor="middle" font-weight="bold">Production</text>
</svg>
